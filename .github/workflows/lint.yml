name: Lint

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run ShellCheck on scripts
        run: |
          ERROR_FOUND=0
          DIRS=("scripts" "docker/scripts")

          for DIR in "${DIRS[@]}"; do
            if [ ! -d "$DIR" ]; then
              echo "⚠️ Directory $DIR does not exist. Skipping."
              continue
            fi

            echo "ℹ️ Checking directory: $DIR"

            sh_files=$(find "$DIR" -type f -name "*.sh")
            if [ -z "$sh_files" ]; then
              echo "No .sh files found in $DIR"
              continue
            fi

            for file in $sh_files; do
              echo "ℹ️ Checking $file..."
              shellcheck --severity=warning "$file" || ERROR_FOUND=1
            done
          done

          if [[ $ERROR_FOUND -eq 0 ]]; then
            echo "✅ All shell scripts passed important ShellCheck checks!"
          else
            echo "❌ ShellCheck found important issues!"
            exit 1
          fi

  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli
      - name: Run markdownlint
        run: |
          ERROR_FOUND=0

          if [ ! -f ".markdownlint.yml" ]; then
            echo "::error::Config file .markdownlint.yml not found"
            exit 1
          fi

          mapfile -t md_files < <(find . -type f -name "*.md" \
            -not -path "./node_modules/*" \
            -not -path "./_site/*")

          if [ ${#md_files[@]} -eq 0 ]; then
            echo "⚠️ No .md files found. Skipping."
            exit 0
          fi

          for file in "${md_files[@]}"; do
            echo "ℹ️ Checking ${file#./}..."
            markdownlint "$file" || ERROR_FOUND=1
          done

          if [[ $ERROR_FOUND -eq 0 ]]; then
            echo "✅ All markdown files passed markdownlint checks!"
          else
            echo "❌ markdownlint found issues!"
            exit 1
          fi

  yamllint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install yamllint
        run: pip install yamllint
      - name: Run yamllint
        run: |
          set -euo pipefail
          if [ ! -f ".yamllint.yml" ]; then
            echo "::error::Config file .yamllint.yml not found"
            exit 1
          fi
          FILES=$(find . -type f \( -name "*.yml" -o -name "*.yaml" \) \
            -not -path "./_site/*" \
            -not -path "./node_modules/*" \
            -not -path "./.git/*")
          if [ -z "$FILES" ]; then
            echo "::warning::No YAML files found, skipping yamllint"
            exit 0
          fi
          COUNT=$(echo "$FILES" | wc -l | tr -d ' ')
          echo "Found $COUNT YAML file(s)"
          if echo "$FILES" | xargs yamllint; then
            echo "yamllint passed"
          else
            echo "yamllint failed"
            exit 1
          fi

  htmlhint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: npm ci
      - name: Run htmlhint
        run: |
          set -euo pipefail
          if [ ! -f ".htmlhintrc" ]; then
            echo "::error::Config file .htmlhintrc not found"
            exit 1
          fi
          FILES=$(find . -name "*.html" \
            -not -path "./_site/*" \
            -not -path "./node_modules/*")
          if [ -z "$FILES" ]; then
            echo "::warning::No .html files found, skipping htmlhint"
            exit 0
          fi
          COUNT=$(echo "$FILES" | wc -l | tr -d ' ')
          echo "Found $COUNT .html file(s)"
          output=$(echo "$FILES" | xargs npx htmlhint 2>&1) || exit_code=$?
          echo "$output" | grep -v "^Config loaded:"
          if [ "${exit_code:-0}" -eq 0 ]; then
            echo "htmlhint passed"
          else
            echo "htmlhint failed"
            exit 1
          fi

  stylelint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: npm ci
      - name: Run stylelint
        run: |
          set -euo pipefail
          if [ ! -f ".stylelintrc.json" ]; then
            echo "::error::Config file .stylelintrc.json not found"
            exit 1
          fi
          FILES=$(find . \( -name "*.css" -o -name "*.scss" -o -name "*.less" \) \
            -not -path "./_site/*" \
            -not -path "./node_modules/*")
          if [ -z "$FILES" ]; then
            echo "::warning::No CSS/SCSS/LESS files found, skipping stylelint"
            exit 0
          fi
          COUNT=$(echo "$FILES" | wc -l | tr -d ' ')
          echo "Found $COUNT CSS/SCSS/LESS file(s)"
          if npx stylelint "**/*.{css,scss,less}" \
            --ignore-pattern "_site/**" \
            --ignore-pattern "node_modules/**"; then
            echo "stylelint passed"
          else
            echo "stylelint failed"
            exit 1
          fi
