name: Lint

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Run shellcheck
        run: |
          echo "Running shellcheck..."
          FILES=$(find . -name "*.sh" \
            -not -path "./_site/*" \
            -not -path "./node_modules/*" \
            -not -path "./.git/*")
          if [ -z "$FILES" ]; then
            echo "No .sh files found, skipping"
            exit 0
          fi
          if echo "$FILES" | xargs shellcheck --severity=warning; then
            echo "shellcheck passed"
          else
            echo "shellcheck failed"
            exit 1
          fi

  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli
      - name: Run markdownlint
        run: |
          echo "Running markdownlint..."
          if markdownlint "**/*.md" --ignore node_modules --ignore _site; then
            echo "markdownlint passed"
          else
            echo "markdownlint failed"
            exit 1
          fi

  yamllint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install yamllint
        run: pip install yamllint
      - name: Run yamllint
        run: |
          echo "Running yamllint..."
          FILES=$(find . -type f \( -name "*.yml" -o -name "*.yaml" \) \
            -not -path "./_site/*" \
            -not -path "./node_modules/*" \
            -not -path "./.git/*")
          if [ -z "$FILES" ]; then
            echo "No YAML files found, skipping"
            exit 0
          fi
          if echo "$FILES" | xargs yamllint; then
            echo "yamllint passed"
          else
            echo "yamllint failed"
            exit 1
          fi

  htmlhint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: npm ci
      - name: Run htmlhint
        run: |
          echo "Running htmlhint..."
          FILES=$(find . -name "*.html" \
            -not -path "./_site/*" \
            -not -path "./node_modules/*")
          if [ -z "$FILES" ]; then
            echo "No .html files found, skipping"
            exit 0
          fi
          if echo "$FILES" | xargs npx htmlhint; then
            echo "htmlhint passed"
          else
            echo "htmlhint failed"
            exit 1
          fi

  stylelint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: npm ci
      - name: Run stylelint
        run: |
          echo "Running stylelint..."
          if npx stylelint "**/*.{css,scss,less}" \
            --ignore-pattern "_site/**" \
            --ignore-pattern "node_modules/**"; then
            echo "stylelint passed"
          else
            echo "stylelint failed"
            exit 1
          fi
