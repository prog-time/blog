name: Lint

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        run: |
          echo "Running shellcheck..."
          if [ ! -f ".shellcheckrc" ]; then
            echo "::warning::Config file .shellcheckrc not found, running with default settings"
          fi
          FILES=$(find . -name "*.sh" \
            -not -path "./_site/*" \
            -not -path "./node_modules/*" \
            -not -path "./.git/*")
          if [ -z "$FILES" ]; then
            echo "::warning::No .sh files found, skipping shellcheck"
            exit 0
          fi
          if echo "$FILES" | xargs shellcheck --severity=warning; then
            echo "shellcheck passed"
          else
            echo "shellcheck failed"
            exit 1
          fi

  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli
      - name: Run markdownlint
        run: |
          echo "Running markdownlint..."
          if [ ! -f ".markdownlint.yml" ]; then
            echo "::error::Config file .markdownlint.yml not found"
            exit 1
          fi
          FILES=$(find . -name "*.md" \
            -not -path "./node_modules/*" \
            -not -path "./_site/*")
          if [ -z "$FILES" ]; then
            echo "::warning::No .md files found, skipping markdownlint"
            exit 0
          fi
          if markdownlint "**/*.md" --ignore node_modules --ignore _site; then
            echo "markdownlint passed"
          else
            echo "markdownlint failed"
            exit 1
          fi

  yamllint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install yamllint
        run: pip install yamllint
      - name: Run yamllint
        run: |
          echo "Running yamllint..."
          if [ ! -f ".yamllint.yml" ]; then
            echo "::error::Config file .yamllint.yml not found"
            exit 1
          fi
          FILES=$(find . -type f \( -name "*.yml" -o -name "*.yaml" \) \
            -not -path "./_site/*" \
            -not -path "./node_modules/*" \
            -not -path "./.git/*")
          if [ -z "$FILES" ]; then
            echo "::warning::No YAML files found, skipping yamllint"
            exit 0
          fi
          if echo "$FILES" | xargs yamllint; then
            echo "yamllint passed"
          else
            echo "yamllint failed"
            exit 1
          fi

  htmlhint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: npm ci
      - name: Run htmlhint
        run: |
          echo "Running htmlhint..."
          if [ ! -f ".htmlhintrc" ]; then
            echo "::error::Config file .htmlhintrc not found"
            exit 1
          fi
          FILES=$(find . -name "*.html" \
            -not -path "./_site/*" \
            -not -path "./node_modules/*")
          if [ -z "$FILES" ]; then
            echo "::warning::No .html files found, skipping htmlhint"
            exit 0
          fi
          output=$(echo "$FILES" | xargs npx htmlhint 2>&1)
          exit_code=$?
          echo "$output" | grep -v "^Config loaded:"
          if [ $exit_code -eq 0 ]; then
            echo "htmlhint passed"
          else
            echo "htmlhint failed"
            exit 1
          fi

  stylelint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: npm ci
      - name: Run stylelint
        run: |
          echo "Running stylelint..."
          if [ ! -f ".stylelintrc.json" ]; then
            echo "::error::Config file .stylelintrc.json not found"
            exit 1
          fi
          FILES=$(find . \( -name "*.css" -o -name "*.scss" -o -name "*.less" \) \
            -not -path "./_site/*" \
            -not -path "./node_modules/*")
          if [ -z "$FILES" ]; then
            echo "::warning::No CSS/SCSS/LESS files found, skipping stylelint"
            exit 0
          fi
          if npx stylelint "**/*.{css,scss,less}" \
            --ignore-pattern "_site/**" \
            --ignore-pattern "node_modules/**"; then
            echo "stylelint passed"
          else
            echo "stylelint failed"
            exit 1
          fi
