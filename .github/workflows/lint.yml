name: Lint

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Run shellcheck
        run: >
          find . -name "*.sh"
          -not -path "./_site/*"
          -not -path "./node_modules/*"
          -not -path "./.git/*"
          | xargs shellcheck --severity=warning

  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli
      - name: Run markdownlint
        run: markdownlint "**/*.md" --ignore node_modules --ignore _site

  yamllint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install yamllint
        run: pip install yamllint
      - name: Run yamllint
        run: >
          find . -type f \( -name "*.yml" -o -name "*.yaml" \)
          -not -path "./_site/*"
          -not -path "./node_modules/*"
          -not -path "./.git/*"
          | xargs yamllint

  htmlhint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: npm ci
      - name: Run htmlhint
        run: >
          find . -name "*.html"
          -not -path "./_site/*"
          -not -path "./node_modules/*"
          | xargs npx htmlhint

  stylelint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: npm ci
      - name: Run stylelint
        run: >
          npx stylelint "**/*.{css,scss,less}"
          --ignore-pattern "_site/**"
          --ignore-pattern "node_modules/**"
